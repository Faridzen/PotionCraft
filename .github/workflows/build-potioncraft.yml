name: Build PotionCraft

on:
  push: 

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name : Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        run : |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/potioncraft:${{ matrix.service }}-latest ./${{ matrix.service }}
            
          docker push ${{ secrets.DOCKER_USERNAME }}/potioncraft:${{ matrix.service }}-latest ./${{ matrix.service }}
          
